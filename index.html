<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Beaumont - AI Automation Engineer | Pyyne Digital Application</title>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: Georgia, serif;
            background-color: #FAFAF8;
            color: #1a1a1a;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            background: rgba(250, 250, 248, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
            z-index: 100;
            padding: 0.75rem 2rem;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .nav-brand {
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #333;
        }

        .nav-links {
            display: flex;
            gap: 1rem;
            list-style: none;
            overflow-x: auto;
            padding: 0.5rem 0;
        }

        .nav-links a {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            text-decoration: none;
            color: #666;
            padding: 0.5rem 0.75rem;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #8b7355;
            border-bottom-color: #8b7355;
        }

        /* Header */
        .header {
            padding: 6rem 2rem;
            text-align: center;
            background: linear-gradient(135deg, #FAFAF8 0%, #f5f5f0 100%);
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
        }

        .header-content {
            max-width: 900px;
            margin: 0 auto;
        }

        .header h1 {
            font-size: 3.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .header-subtitle {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 1.25rem;
            color: #8b7355;
            font-weight: 500;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
        }

        .header-meta {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
        }

        .header-description {
            font-size: 1.125rem;
            color: #333;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        /* Stats Bar */
        .stats-bar {
            background: #fff;
            border-top: 1px solid rgba(26, 26, 26, 0.1);
            border-bottom: 1px solid rgba(26, 26, 26, 0.1);
            padding: 2rem;
        }

        .stats-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            text-align: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 600;
            color: #8b7355;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .stat-label {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Main Content */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        section {
            margin-bottom: 5rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 400;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
            color: #1a1a1a;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(139, 115, 85, 0.2);
        }

        /* Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #fff;
            border: 1px solid rgba(26, 26, 26, 0.1);
            padding: 2rem;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            border-color: #8b7355;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.1);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #1a1a1a;
        }

        .card-description {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.7;
            margin-bottom: 1rem;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tag {
            display: inline-block;
            background: rgba(139, 115, 85, 0.1);
            color: #8b7355;
            padding: 0.375rem 0.75rem;
            border-radius: 20px;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
        }

        .card-expand {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(26, 26, 26, 0.1);
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            color: #8b7355;
            font-weight: 500;
            cursor: pointer;
        }

        .card-details {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(26, 26, 26, 0.1);
            font-size: 0.95rem;
            color: #333;
            line-height: 1.8;
        }

        /* Expandable Agent Cards */
        .agent-card {
            background: #fff;
            border: 1px solid rgba(26, 26, 26, 0.1);
            padding: 2rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .agent-card:hover {
            border-color: #8b7355;
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.1);
        }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            cursor: pointer;
        }

        .agent-title-group h3 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: #1a1a1a;
        }

        .agent-version {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .expand-icon {
            font-size: 1.5rem;
            color: #8b7355;
            transition: transform 0.3s ease;
        }

        .expand-icon.open {
            transform: rotate(180deg);
        }

        .agent-description {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.7;
            margin-top: 1rem;
        }

        .agent-details {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(26, 26, 26, 0.1);
        }

        .detail-row {
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 1rem;
        }

        .detail-label {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .detail-value {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.6;
        }

        /* Integration Pills */
        .integrations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
        }

        .integration-pill {
            background: linear-gradient(135deg, rgba(139, 115, 85, 0.05) 0%, rgba(139, 115, 85, 0.02) 100%);
            border: 1px solid rgba(139, 115, 85, 0.2);
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            font-weight: 500;
            color: #8b7355;
        }

        /* Architecture Diagram */
        .architecture-container {
            background: #fff;
            border: 1px solid rgba(26, 26, 26, 0.1);
            padding: 2rem;
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        svg {
            min-width: 100%;
            max-width: 100%;
            height: auto;
        }

        /* Timeline */
        .timeline {
            position: relative;
            padding: 2rem 0;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 40px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(139, 115, 85, 0.2);
        }

        .timeline-item {
            margin-bottom: 2rem;
            margin-left: 120px;
            position: relative;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -80px;
            top: 6px;
            width: 16px;
            height: 16px;
            background: #8b7355;
            border: 3px solid #FAFAF8;
            border-radius: 50%;
            box-shadow: 0 0 0 1px rgba(139, 115, 85, 0.2);
        }

        .timeline-date {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .timeline-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .timeline-content {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.7;
        }

        /* Results Section */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .result-card {
            background: #fff;
            border: 1px solid rgba(26, 26, 26, 0.1);
            padding: 2rem;
            border-radius: 4px;
        }

        .result-metric {
            font-size: 2rem;
            font-weight: 600;
            color: #8b7355;
            font-family: system-ui, -apple-system, sans-serif;
            margin-bottom: 0.5rem;
        }

        .result-label {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .result-description {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.7;
        }

        /* Contact Section */
        .contact-section {
            background: linear-gradient(135deg, #fff 0%, #f5f5f0 100%);
            border: 1px solid rgba(26, 26, 26, 0.1);
            padding: 3rem;
            border-radius: 4px;
            text-align: center;
        }

        .contact-section h2 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        .contact-link {
            text-decoration: none;
            color: #8b7355;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: border-color 0.3s ease;
        }

        .contact-link:hover {
            border-bottom-color: #8b7355;
        }

        /* Footer */
        footer {
            background: #1a1a1a;
            color: #999;
            padding: 2rem;
            text-align: center;
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 0.875rem;
            border-top: 1px solid rgba(139, 115, 85, 0.3);
        }

        footer a {
            color: #8b7355;
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s ease;
        }

        footer a:hover {
            border-bottom-color: #8b7355;
        }

        /* Scroll Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease-out;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }

            .nav-links {
                font-size: 0.75rem;
                gap: 0.5rem;
            }

            .nav-links a {
                padding: 0.4rem 0.5rem;
            }

            .stats-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .stat-number {
                font-size: 1.75rem;
            }

            .cards-grid {
                grid-template-columns: 1fr;
            }

            .timeline::before {
                left: 20px;
            }

            .timeline-item {
                margin-left: 80px;
            }

            .timeline-item::before {
                left: -60px;
            }

            .detail-row {
                grid-template-columns: 1fr;
                gap: 0.25rem;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Scroll Reveal Hook
        function useReveal() {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        observer.unobserve(entry.target);
                    }
                }, { threshold: 0.1 });

                if (ref.current) {
                    observer.observe(ref.current);
                }

                return () => observer.disconnect();
            }, []);

            return [ref, isVisible];
        }

        // Animated Counter
        function AnimatedCounter({ value, duration = 2000 }) {
            const [count, setCount] = useState(0);
            const ref = useRef(null);

            useEffect(() => {
                let animationFrameId;
                const startTime = Date.now();

                const animate = () => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    setCount(Math.floor(value * progress));

                    if (progress < 1) {
                        animationFrameId = requestAnimationFrame(animate);
                    }
                };

                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        animationFrameId = requestAnimationFrame(animate);
                        observer.unobserve(ref.current);
                    }
                });

                if (ref.current) {
                    observer.observe(ref.current);
                }

                return () => {
                    cancelAnimationFrame(animationFrameId);
                    observer.disconnect();
                };
            }, [value, duration]);

            return <span ref={ref}>{count.toLocaleString()}</span>;
        }

        // Nav Component
        function Nav() {
            const [activeSection, setActiveSection] = useState('role-match');

            const sections = [
                { id: 'role-match', label: 'Role Match' },
                { id: 'approach', label: 'Consulting Approach' },
                { id: 'agents', label: 'Production Agents' },
                { id: 'architecture', label: 'Architecture' },
                { id: 'integrations', label: 'Integrations' },
                { id: 'operations', label: 'Operations Platform' },
                { id: 'results', label: 'Client Results' },
                { id: 'experience', label: 'Experience' },
                { id: 'why-pyyne', label: 'Why Pyyne' },
            ];

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth' });
                    setActiveSection(id);
                }
            };

            return (
                <nav>
                    <div className="nav-container">
                        <div className="nav-brand">Harry Beaumont</div>
                        <ul className="nav-links">
                            {sections.map(section => (
                                <li key={section.id}>
                                    <a
                                        href={`#${section.id}`}
                                        onClick={(e) => {
                                            e.preventDefault();
                                            scrollToSection(section.id);
                                        }}
                                        className={activeSection === section.id ? 'active' : ''}
                                    >
                                        {section.label}
                                    </a>
                                </li>
                            ))}
                        </ul>
                    </div>
                </nav>
            );
        }

        // Header Component
        function Header() {
            return (
                <div className="header">
                    <div className="header-content">
                        <h1>Harry Beaumont</h1>
                        <div className="header-subtitle">AI Automation Engineer</div>
                        <div className="header-meta">Application · AI Automation Engineer · Pyyne Digital</div>
                        <p className="header-description">
                            Consulting AI engineer with 3+ years running production automation systems. I scope workflow automations for SMEs, then architect and build custom agents, integrations, and platforms that non-technical teams can operate at scale.
                        </p>
                    </div>
                </div>
            );
        }

        // Stats Bar Component
        function StatsBar() {
            const stats = [
                { number: 5, label: 'Production Agents' },
                { number: 112000, label: 'Lines of Code' },
                { number: 30, label: 'AI Tools' },
                { number: 20, label: 'API Integrations' },
                { number: 70, label: 'Live Properties' },
            ];

            return (
                <div className="stats-bar">
                    <div className="stats-container">
                        {stats.map((stat, idx) => (
                            <div key={idx} className="stat-item">
                                <div className="stat-number">
                                    {stat.number >= 1000 ? (
                                        <>
                                            <AnimatedCounter value={stat.number} duration={2000} />
                                            {stat.number >= 112000 && '+'}
                                        </>
                                    ) : (
                                        <AnimatedCounter value={stat.number} duration={2000} />
                                    )}
                                </div>
                                <div className="stat-label">{stat.label}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Role Match Cards
        function RoleMatchSection() {
            const [ref, isVisible] = useReveal();

            const cards = [
                {
                    title: "I Scope AND Build",
                    description: "Consulting foundation with engineering chops in one person. I identify which workflows will drive ROI, then architect and build the agents to execute them.",
                },
                {
                    title: "Custom-Built, Not Off-the-Shelf",
                    description: "Built a 4,600-line WhatsApp bridge instead of using Zapier or n8n because clients need context-aware logic. I understand when to integrate vs. build vs. go deeper.",
                },
                {
                    title: "Non-Technical Stakeholders",
                    description: "7 years running property businesses taught me what operators actually need. I design systems for non-technical teams to run solo, with dashboards that make sense to them.",
                },
                {
                    title: "Production Experience, Not POCs",
                    description: "3+ years of live systems with real consequences. These agents process 227 messages/day and handle £450k/month in financial workflows. Not prototypes.",
                },
                {
                    title: "Repeatable Architecture",
                    description: "The 5-agent pattern works across verticals. Same consulting and engineering approach whether it's hospitality, property management, or another SME workflow.",
                },
                {
                    title: "Consulting First, Engineering Second",
                    description: "I map business processes, identify bottlenecks, and scope what custom automation is worth building. Then I hand over systems that operators can actually run.",
                },
            ];

            return (
                <section id="role-match" ref={ref} className={`reveal ${isVisible ? 'active' : ''}`}>
                    <h2 className="section-title">Role Match</h2>
                    <div className="cards-grid">
                        {cards.map((card, idx) => (
                            <div key={idx} className="card">
                                <h3 className="card-title">{card.title}</h3>
                                <p className="card-description">{card.description}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        // Consulting Approach Section
        function ConsultingApproachSection() {
            const [ref, isVisible] = useReveal();

            const steps = [
                {
                    title: "Identify",
                    description: "Find the highest-ROI workflows to automate. Not every process needs automation. I help clients see which ones move the needle.",
                },
                {
                    title: "Map",
                    description: "Document the current process end-to-end. Understand what's manual, where bottlenecks are, and what data flows where.",
                },
                {
                    title: "Scope",
                    description: "Define what to build (custom agents), integrate (APIs), and leave manual (not everything should be automated). Set realistic scope and timelines.",
                },
                {
                    title: "Build",
                    description: "Custom agents, API integrations, dashboards, and monitoring. Systems designed for your team to run, not for me to babysit.",
                },
                {
                    title: "Hand Over",
                    description: "Training, documentation, and dashboards that make sense to non-technical operators. The system runs itself; I step back.",
                },
            ];

            return (
                <section id="approach" ref={ref} className={`reveal ${isVisible ? 'active' : ''}`}>
                    <h2 className="section-title">Consulting Approach</h2>
                    <div className="cards-grid">
                        {steps.map((step, idx) => (
                            <div key={idx} className="card">
                                <h3 className="card-title">{step.title}</h3>
                                <p className="card-description">{step.description}</p>
                            </div>
                        ))}
                    </div>
                </section>
            );
        }

        // Agents Section
        function AgentCard({ agent, expanded, onToggle }) {
            return (
                <div className="agent-card">
                    <div className="agent-header" onClick={onToggle}>
                        <div className="agent-title-group">
                            <h3>{agent.title}</h3>
                            <div className="agent-version">{agent.version}</div>
                        </div>
                        <div className={`expand-icon ${expanded ? 'open' : ''}`}>▼</div>
                    </div>
                    <p className="agent-description">{agent.description}</p>
                    {agent.tags && (
                        <div className="card-tags">
                            {agent.tags.map((tag, idx) => (
                                <span key={idx} className="tag">{tag}</span>
                            ))}
                        </div>
                    )}
                    {expanded && agent.details && (
                        <div className="agent-details">
                            {agent.details.map((detail, idx) => (
                                <div key={idx} className="detail-row">
                                    <div className="detail-label">{detail.label}</div>
                                    <div className="detail-value">{detail.value}</div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function AgentsSection() {
            const [ref, isVisible] = useReveal();
            const [expandedAgent, setExpandedAgent] = useState(0);

            const agents = [
                {
                    title: "Communications Agent",
                    version: "v3.1",
                    description: "Handles incoming messages, classifies intent across 22 categories, and auto-sends responses with 100% uptime. Processes 227 messages/day with 169 fully automated.",
                    tags: ["Claude API", "22 Intents", "Self-Learning", "Hostaway API"],
                    details: [
